[General]
BUFFER_SIZE = 370
BUFF_BEFORE = 0.02

[Input]
COORDSYS         = CH1903
COORDPARAM       = NULL
TIME_ZONE        = 0
METEO            = SMET
METEOPATH        = ./input
METEOFILE1       = snow_storage
SNOWFILE1        = snow_storage

[Output]
COORDSYS         = CH1903
COORDPARAM       = NULL
TIME_ZONE        = 0
METEOPATH        = ./output
EXPERIMENT       = snow_storage
TS_WRITE         = true
TS_FORMAT        = MET
TS_START         = 0.0
TS_DAYS_BETWEEN  = 0.0416667     ; 1-hour output
PROF_WRITE       = true
PROF_FORMAT      = PRO
AGGREG_PRF       = false
PROF_START       = 0.0
PROF_DAYS_BETWEEN = 1.0

[Snowpack]
; --- Required flags (crashed without these) ---
ENFORCE_MEASURED_SNOW_HEIGHTS = false   ; no HS sensor in our SMET
MEAS_TSS                      = false   ; no measured surface temp

; --- Radiation ---
SW_MODE                       = INCOMING   ; we provide ISWR directly

; --- Sensor heights ---
HEIGHT_OF_WIND_VALUE          = 10.0    ; wind at 10 m (Air_Vel_m/s_10m)
HEIGHT_OF_METEO_VALUES        = 2.0     ; TA/RH at 2 m (standard)

; --- Stability & roughness (replicates h_conv~8 W/m2K from Python model) ---
ATMOSPHERIC_STABILITY         = NEUTRAL
ROUGHNESS_LENGTH              = 0.002   ; z0 [m]

; --- Time step: matches Python dt=600 s ---
CALCULATION_STEP_LENGTH       = 10.0   ; [min]

; --- Boundary conditions ---
CHANGE_BC                     = false  ; fixed lower BC via soil temp
THRESH_CHANGE_BC              = -1.0

; --- Ground / soil ---
SNP_SOIL                      = true  ; activates TSG-driven lower BC
SOIL_FLUX                     = true
; GEO_HEAT approximates Robin BC ground flux from Python model:
;   R_total = L_soil/k_soil + 1/h_ground = 1.0/1.5 + 1/3.675 = 0.939 m2K/W
;   TSG field in SMET drives the actual transient flux via SOIL_FLUX
GEO_HEAT                      = 0.06   ; background geothermal [W/m2]

; --- No canopy ---
CANOPY                        = false

[SnowpackAdvanced]
; Liquid water / percolation - replicates USE_PERCOLATION=True, bucket method
WATERTRANSPORTMODEL_SNOW      = BUCKET
RESIDUAL_WATER_CONTENT        = 0.055119   ; theta_e from Python model

; Soil / insulation thermal conductivity
; COSENZA2003 computes k from volume fractions — works well for organic material
SOIL_THERMAL_CONDUCTIVITY     = COSENZA2003
WATERTRANSPORTMODEL_SOIL      = BUCKET   ; allow moisture movement in insulation layer

; No wind redistribution for storage scenario
SNOW_EROSION                  = false
SNOW_REDISTRIBUTION           = false

; Fixed output levels for comparison with Python 3-layer model
; Depths at 0.75, 2.25, 3.75 m (midpoints of each 1.5 m layer)
FIXED_POSITIONS               = 0.10 0.95 2.45 3.95   ; insulation mid (0.10) + snow layer mids shifted by 0.20m insulation thickness

[Filters]
PSUM::filter1       = min
PSUM::arg1::soft    = true
PSUM::arg1::min     = 0.0

TA::filter1         = min_max
TA::arg1::min       = 240
TA::arg1::max       = 330

RH::filter1         = min_max
RH::arg1::min       = 0.01
RH::arg1::max       = 1.2
RH::filter2         = min_max
RH::arg2::soft      = true
RH::arg2::min       = 0.05
RH::arg2::max       = 1.0

ISWR::filter1       = min_max
ISWR::arg1::min     = -10
ISWR::arg1::max     = 1500
ISWR::filter2       = min_max
ISWR::arg2::soft    = true
ISWR::arg2::min     = 0
ISWR::arg2::max     = 1500

TSG::filter1        = min_max
TSG::arg1::min      = 200
TSG::arg1::max      = 320

VW::filter1         = min_max
VW::arg1::min       = -2
VW::arg1::max       = 70
VW::filter2         = min_max
VW::arg2::soft      = true
VW::arg2::min       = 0.0
VW::arg2::max       = 50.0

[Interpolations1D]
MAX_GAP_SIZE        = 86400
PSUM::resample1     = accumulate
PSUM::ARG1::period  = 600
PSUM::ARG1::extrapolate = true
VW::resample1       = nearest
VW::ARG1::extrapolate = true
TA::resample1       = nearest
TA::ARG1::extrapolate = true
RH::resample1       = nearest
RH::ARG1::extrapolate = true
ISWR::resample1     = nearest
ISWR::ARG1::extrapolate = true
TSG::resample1      = nearest
TSG::ARG1::extrapolate = true