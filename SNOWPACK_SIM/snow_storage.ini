[General]
BUFFER_SIZE = 370
BUFF_BEFORE = 0.02

[Input]
COORDSYS         = CH1903
COORDPARAM       = NULL
TIME_ZONE        = 0
METEO            = SMET
METEOPATH        = ./input
METEOFILE1       = snow_storage
SNOWFILE1        = snow_storage

[Output]
COORDSYS         = CH1903
COORDPARAM       = NULL
TIME_ZONE        = 0
METEOPATH        = ./output
EXPERIMENT       = snow_storage
TS_WRITE         = true
TS_FORMAT        = MET
TS_START         = 0.0
TS_DAYS_BETWEEN  = 0.0416667     ; 1-hour output
PROF_WRITE       = true
PROF_FORMAT      = PRO
AGGREG_PRF       = false
PROF_START       = 0.0
PROF_DAYS_BETWEEN = 1.0

[Snowpack]
ENFORCE_MEASURED_SNOW_HEIGHTS = false
MEAS_TSS                      = true

SW_MODE                       = INCOMING
HEIGHT_OF_WIND_VALUE          = 10.0
HEIGHT_OF_METEO_VALUES        = 2.0

ATMOSPHERIC_STABILITY         = NEUTRAL
ROUGHNESS_LENGTH              = 0.002

CALCULATION_STEP_LENGTH       = 10.0   ; Matches Python dt=600.0

CHANGE_BC                     = false
THRESH_CHANGE_BC              = -1.0

SNP_SOIL                      = true
SOIL_FLUX                     = true
GEO_HEAT                      = 2.4    ;
CANOPY                        = false

[SnowpackAdvanced]
WATERTRANSPORTMODEL_SNOW      = BUCKET
RESIDUAL_WATER_CONTENT        = 0.056854

SOIL_THERMAL_CONDUCTIVITY     = RAW
WATERTRANSPORTMODEL_SOIL      = BUCKET

SNOW_EROSION                  = false
SNOW_REDISTRIBUTION           = false

; Shifted heights upwards to account for the new 1.0 m soil column
; 1.75 (Snow 1), 3.25 (Snow 2), 4.75 (Snow 3), 5.60 (Insulation)
FIXED_POSITIONS               = 1.75 3.25 4.60

[Filters]
PSUM::filter1       = min
PSUM::arg1::soft    = true
PSUM::arg1::min     = 0.0

TA::filter1         = min_max
TA::arg1::min       = 240
TA::arg1::max       = 330

RH::filter1         = min_max
RH::arg1::min       = 0.01
RH::arg1::max       = 1.2
RH::filter2         = min_max
RH::arg2::soft      = true
RH::arg2::min       = 0.05
RH::arg2::max       = 1.0

ISWR::filter1       = min_max
ISWR::arg1::min     = -10
ISWR::arg1::max     = 1500
ISWR::filter2       = min_max
ISWR::arg2::soft    = true
ISWR::arg2::min     = 0
ISWR::arg2::max     = 1500

TSG::filter1        = min_max
TSG::arg1::min      = 200
TSG::arg1::max      = 320

VW::filter1         = min_max
VW::arg1::min       = -2
VW::arg1::max       = 70
VW::filter2         = min_max
VW::arg2::soft      = true
VW::arg2::min       = 0.0
VW::arg2::max       = 50.0

[Interpolations1D]
MAX_GAP_SIZE        = 86400
PSUM::resample1     = accumulate
PSUM::ARG1::period  = 600
PSUM::ARG1::extrapolate = true
VW::resample1       = nearest
VW::ARG1::extrapolate = true
TA::resample1       = nearest
TA::ARG1::extrapolate = true
RH::resample1       = nearest
RH::ARG1::extrapolate = true
ISWR::resample1     = nearest
ISWR::ARG1::extrapolate = true
TSG::resample1      = nearest
TSG::ARG1::extrapolate = true